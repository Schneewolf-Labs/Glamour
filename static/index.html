<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glamour Arena</title>
<style>
:root {
  --bg:        #0c0c11;
  --panel:     #12121a;
  --surface:   #1a1a27;
  --border:    #22223a;
  --accent:    #818cf8;
  --accent-hi: #a5b4fc;
  --accent-lo: #4f46e5;
  --text:      #e2e8f0;
  --muted:     #64748b;
  --error:     #f87171;
  --win:       #34d399;
  --bar-h:     116px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
}

body {
  display: grid;
  grid-template-rows: 44px 1fr var(--bar-h);
}

/* ── Header ──────────────────────────────────────────────── */
header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  user-select: none;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-mark {
  width: 22px;
  height: 22px;
  background: linear-gradient(135deg, var(--accent-lo), var(--accent-hi));
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

.logo-name {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
}

.logo-tag {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
}

.header-link {
  margin-left: auto;
  color: var(--muted);
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  transition: color 0.15s, border-color 0.15s;
}

.header-link:hover {
  color: var(--text);
  border-color: var(--accent);
}

/* ── Arena ───────────────────────────────────────────────── */
#arena {
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  min-height: 0;
}

.divider {
  background: var(--border);
}

/* ── Panel ───────────────────────────────────────────────── */
.panel {
  display: flex;
  flex-direction: column;
  background: var(--panel);
  min-height: 0;
}

.panel-header {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
  z-index: 20;
  flex-shrink: 0;
}

.panel-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

.panel-meta {
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}

.panel-meta.is-truncated { color: var(--error); }

/* ── Model Picker ─────────────────────────────────────────── */
.picker {
  position: relative;
  flex: 1;
  min-width: 0;
}

.picker-input {
  width: 100%;
  padding: 6px 10px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
  cursor: pointer;
}

.picker-input:focus {
  border-color: var(--accent);
  cursor: text;
}

.picker-input::placeholder {
  color: var(--muted);
}

.picker-drop {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-height: 280px;
  overflow-y: auto;
  z-index: 100;
  display: none;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
}

.picker-drop.open {
  display: block;
}

.picker-drop::-webkit-scrollbar { width: 4px; }
.picker-drop::-webkit-scrollbar-track { background: transparent; }
.picker-drop::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.picker-option {
  padding: 7px 12px;
  cursor: pointer;
  color: var(--muted);
  transition: background 0.1s, color 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 12px;
}

.picker-option:hover {
  background: rgba(129, 140, 248, 0.08);
  color: var(--text);
}

.picker-option.is-selected {
  color: var(--accent);
  background: rgba(129, 140, 248, 0.06);
}

.picker-empty {
  padding: 12px;
  color: var(--muted);
  text-align: center;
  font-size: 12px;
}

/* ── Iframe area ─────────────────────────────────────────── */
.iframe-wrap {
  flex: 1;
  position: relative;
  min-height: 0;
  background: #fff;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  transition: opacity 0.2s;
}

.panel-empty {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--muted);
  pointer-events: none;
}

.panel-empty .empty-icon {
  font-size: 36px;
  opacity: 0.3;
}

.panel-empty .empty-text {
  font-size: 12px;
  opacity: 0.5;
}

/* ── Loading overlay ─────────────────────────────────────── */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(12, 12, 17, 0.82);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  backdrop-filter: blur(3px);
  z-index: 10;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-model {
  font-size: 11px;
  color: var(--muted);
  max-width: 200px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.loading-timer {
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
}

/* ── Error state ─────────────────────────────────────────── */
.error-overlay {
  position: absolute;
  inset: 0;
  background: var(--panel);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 32px;
  text-align: center;
  z-index: 10;
}

.error-icon { font-size: 28px; opacity: 0.6; }
.error-msg { color: var(--error); font-size: 12px; line-height: 1.6; }

/* ── Truncation (hit token limit) ────────────────────────── */
.iframe-wrap.is-truncated {
  box-shadow: inset 0 0 0 2px var(--error);
}

.truncate-bar {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 12;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 12px;
  background: rgba(248, 113, 113, 0.95);
  color: #fff;
  font-size: 12px;
  font-weight: 500;
}

.continue-btn {
  height: auto;
  padding: 5px 12px;
  background: #fff;
  color: #b91c1c;
  border: none;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

.continue-btn:hover { background: #fee2e2; }
.continue-btn:disabled { opacity: 0.6; }

/* ── Prompt bar ──────────────────────────────────────────── */
#prompt-bar {
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  gap: 10px;
  padding: 10px 14px;
}

#prompt-input {
  flex: 1;
  resize: none;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: inherit;
  line-height: 1.5;
  outline: none;
  transition: border-color 0.15s;
}

#prompt-input:focus {
  border-color: var(--accent);
}

#prompt-input::placeholder {
  color: var(--muted);
}

.bar-actions {
  display: flex;
  flex-direction: column;
  justify-content: stretch;
  gap: 6px;
}

button {
  padding: 0 18px;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.15s, background 0.15s, opacity 0.15s;
  white-space: nowrap;
}

button:hover {
  background: var(--border);
}

button.primary {
  background: var(--accent-lo);
  border-color: var(--accent-lo);
  color: #fff;
}

button.primary:hover {
  background: var(--accent);
  border-color: var(--accent);
}

button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

/* ── Vote bar ────────────────────────────────────────────── */
.panel-vote {
  flex-shrink: 0;
  padding: 8px;
  border-top: 1px solid var(--border);
  display: flex;
}

.vote-btn {
  flex: 1;
  height: 34px;
  padding: 0 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  font-weight: 600;
}

.vote-btn:hover:not(:disabled) {
  border-color: var(--win);
  color: var(--win);
}

.vote-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.vote-btn.is-winner {
  background: var(--win);
  border-color: var(--win);
  color: #04120b;
  opacity: 1;
}

.vote-btn.is-loser {
  opacity: 0.4;
}

/* ── Utility ─────────────────────────────────────────────── */
[hidden] { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">✦</div>
    <span class="logo-name">Glamour</span>
    <span class="logo-tag">Design Arena</span>
  </div>
  <a class="header-link" href="/history">History →</a>
</header>

<main id="arena">

  <!-- Left panel -->
  <div class="panel" id="panel-a">
    <div class="panel-header">
      <span class="panel-label">A</span>
      <div class="picker" id="picker-a">
        <input class="picker-input" id="input-a" placeholder="Search models…" autocomplete="off" spellcheck="false">
        <div class="picker-drop" id="drop-a"></div>
      </div>
      <span class="panel-meta" id="meta-a"></span>
    </div>
    <div class="iframe-wrap" id="wrap-a">
      <div class="panel-empty" id="empty-a">
        <div class="empty-icon">◈</div>
        <div class="empty-text">Generate a design to see it here</div>
      </div>
      <div class="loading-overlay" id="loading-a" hidden>
        <div class="spinner"></div>
        <div class="loading-model" id="loading-model-a"></div>
        <div class="loading-timer" id="loading-timer-a">0.0s</div>
      </div>
      <div class="error-overlay" id="error-a" hidden>
        <div class="error-icon">⚠</div>
        <div class="error-msg" id="error-msg-a"></div>
      </div>
      <div class="truncate-bar" id="trunc-a" hidden>
        <span>⚠ Hit token limit — design is cut off</span>
        <button class="continue-btn" id="continue-a">Continue +2k →</button>
      </div>
      <iframe id="frame-a" sandbox="allow-scripts" hidden></iframe>
    </div>
    <div class="panel-vote">
      <button class="vote-btn" id="vote-a" disabled>▲ This one's better</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Right panel -->
  <div class="panel" id="panel-b">
    <div class="panel-header">
      <span class="panel-label">B</span>
      <div class="picker" id="picker-b">
        <input class="picker-input" id="input-b" placeholder="Search models…" autocomplete="off" spellcheck="false">
        <div class="picker-drop" id="drop-b"></div>
      </div>
      <span class="panel-meta" id="meta-b"></span>
    </div>
    <div class="iframe-wrap" id="wrap-b">
      <div class="panel-empty" id="empty-b">
        <div class="empty-icon">◈</div>
        <div class="empty-text">Generate a design to see it here</div>
      </div>
      <div class="loading-overlay" id="loading-b" hidden>
        <div class="spinner"></div>
        <div class="loading-model" id="loading-model-b"></div>
        <div class="loading-timer" id="loading-timer-b">0.0s</div>
      </div>
      <div class="error-overlay" id="error-b" hidden>
        <div class="error-icon">⚠</div>
        <div class="error-msg" id="error-msg-b"></div>
      </div>
      <div class="truncate-bar" id="trunc-b" hidden>
        <span>⚠ Hit token limit — design is cut off</span>
        <button class="continue-btn" id="continue-b">Continue +2k →</button>
      </div>
      <iframe id="frame-b" sandbox="allow-scripts" hidden></iframe>
    </div>
    <div class="panel-vote">
      <button class="vote-btn" id="vote-b" disabled>▲ This one's better</button>
    </div>
  </div>

</main>

<footer id="prompt-bar">
  <textarea id="prompt-input" placeholder="Describe the page you want both models to design…" rows="3"></textarea>
  <div class="bar-actions">
    <button id="btn-gen-prompt">✦ Generate Prompt</button>
    <button id="btn-generate" class="primary">Generate →</button>
  </div>
</footer>

<script>
"use strict";

// Parse a response as JSON, but surface a readable error if the server returned
// an HTML error page (e.g. a 500) instead of JSON.
async function parseJson(resp) {
  const text = await resp.text();
  try {
    return JSON.parse(text);
  } catch (e) {
    const snippet = text.trim().slice(0, 120).replace(/\s+/g, " ");
    throw new Error(`Server error (HTTP ${resp.status}): ${snippet || "non-JSON response"}`);
  }
}

// ── State ──────────────────────────────────────────────────────────────────
let allModels = [];
const state = {
  a: { model: null, raw: "", prompt: "", batch: "", id: "" },
  b: { model: null, raw: "", prompt: "", batch: "", id: "" },
};
const timers = { a: null, b: null };
let voted = false;

// ── Model picker ───────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function initPicker(side) {
  const input = document.getElementById(`input-${side}`);
  const drop  = document.getElementById(`drop-${side}`);
  const picker = document.getElementById(`picker-${side}`);

  function openDrop() {
    renderOptions(side, input.value);
    drop.classList.add("open");
  }

  function closeDrop() {
    drop.classList.remove("open");
    // Restore display to selected model id
    if (state[side].model) input.value = state[side].model.id;
    else input.value = "";
  }

  input.addEventListener("focus", openDrop);

  input.addEventListener("input", () => {
    renderOptions(side, input.value);
    drop.classList.add("open");
  });

  input.addEventListener("blur", () => {
    // Delay so mousedown on an option fires first
    setTimeout(closeDrop, 160);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { closeDrop(); input.blur(); }
  });

  // Close when clicking outside
  document.addEventListener("click", (e) => {
    if (!picker.contains(e.target)) drop.classList.remove("open");
  });
}

function renderOptions(side, query) {
  const drop = document.getElementById(`drop-${side}`);
  const q = (query || "").toLowerCase().trim();
  const filtered = q
    ? allModels.filter(m =>
        m.id.toLowerCase().includes(q) ||
        m.name.toLowerCase().includes(q))
    : allModels;

  const shown = filtered.slice(0, 120);

  if (shown.length === 0) {
    drop.innerHTML = `<div class="picker-empty">No models match "${escHtml(query)}"</div>`;
    return;
  }

  const cur = state[side].model?.id;
  drop.innerHTML = shown.map(m => {
    const sel = m.id === cur ? " is-selected" : "";
    return `<div class="picker-option${sel}" data-id="${escHtml(m.id)}" title="${escHtml(m.id)}">${escHtml(m.name)}</div>`;
  }).join("");

  drop.querySelectorAll(".picker-option").forEach(el => {
    // mousedown (not click) so it fires before the input's blur
    el.addEventListener("mousedown", (e) => {
      e.preventDefault();
      selectModel(side, el.dataset.id);
      drop.classList.remove("open");
    });
  });
}

function selectModel(side, id) {
  const m = allModels.find(m => m.id === id);
  if (!m) return;
  state[side].model = m;
  document.getElementById(`input-${side}`).value = m.id;
}

// ── Load models ────────────────────────────────────────────────────────────
async function loadModels() {
  ["a", "b"].forEach(s => {
    document.getElementById(`input-${s}`).value = "Loading models…";
    document.getElementById(`input-${s}`).disabled = true;
  });

  try {
    const resp = await fetch("/api/models");
    allModels = await parseJson(resp);
    if (allModels.error) throw new Error(allModels.error);
  } catch (e) {
    allModels = [];
    console.error("Failed to load models:", e);
  }

  ["a", "b"].forEach(s => {
    const input = document.getElementById(`input-${s}`);
    input.disabled = false;
    input.value = "";
    input.placeholder = "Search models…";
  });

  // Default selections
  const DEFAULTS = [
    "~anthropic/claude-opus-latest",
    "google/gemini-2.5-flash",
  ];
  DEFAULTS.forEach((id, i) => {
    const side = i === 0 ? "a" : "b";
    const m = allModels.find(m => m.id === id) || allModels[i] || null;
    if (m) selectModel(side, m.id);
  });
}

// ── Generate prompt ────────────────────────────────────────────────────────
async function generatePrompt() {
  const btn = document.getElementById("btn-gen-prompt");
  btn.disabled = true;
  btn.textContent = "Generating…";
  try {
    const resp = await fetch("/api/generate-prompt", { method: "POST" });
    const data = await parseJson(resp);
    if (data.error) throw new Error(data.error);
    document.getElementById("prompt-input").value = data.prompt;
  } catch (e) {
    alert("Could not generate prompt: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "✦ Generate Prompt";
  }
}

// ── Generate designs ───────────────────────────────────────────────────────
async function generateBoth() {
  const prompt = document.getElementById("prompt-input").value.trim();
  if (!prompt) { alert("Enter a prompt first."); return; }

  const missingModel = ["a","b"].find(s => !state[s].model);
  if (missingModel) {
    alert(`Select a model for panel ${missingModel.toUpperCase()} first.`);
    return;
  }

  const btn = document.getElementById("btn-generate");
  btn.disabled = true;

  // One batch id ties the A/B pair together in history.
  const batch = (Date.now().toString(36) + Math.random().toString(36).slice(2, 6));
  state.a.batch = state.b.batch = batch;
  resetVotes();

  await Promise.all(["a", "b"].map(side => generateOne(side, prompt)));

  btn.disabled = false;
}

async function generateOne(side, prompt, partial = "") {
  const model = state[side].model;
  state[side].prompt = prompt;
  setLoading(side, true, model.id);
  clearResult(side);
  setTruncated(side, false);

  try {
    const resp = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: model.id, prompt, partial,
                             batch: state[side].batch, side }),
    });
    const data = await parseJson(resp);
    if (!resp.ok || data.error) throw new Error(data.error || `HTTP ${resp.status}`);
    state[side].raw = data.raw || "";
    state[side].id = data.id || "";
    renderResult(side, data);
    setMeta(side, data.elapsed, data.truncated);
    setTruncated(side, data.truncated);
  } catch (e) {
    state[side].id = "";
    showError(side, e.message);
  } finally {
    setLoading(side, false);
    updateVoteButtons();
  }
}

async function continueGen(side) {
  const btn = document.getElementById(`continue-${side}`);
  btn.disabled = true;
  btn.textContent = "Continuing…";
  await generateOne(side, state[side].prompt, state[side].raw);
  btn.disabled = false;
  btn.textContent = "Continue +2k →";
}

// ── Voting (preference pairs) ──────────────────────────────────────────────
function bothReady() {
  return Boolean(state.a.id && state.b.id);
}

function resetVotes() {
  voted = false;
  ["a", "b"].forEach(s => {
    state[s].id = "";
    const btn = document.getElementById(`vote-${s}`);
    btn.classList.remove("is-winner", "is-loser");
    btn.textContent = "▲ This one's better";
  });
  updateVoteButtons();
}

function updateVoteButtons() {
  const ready = bothReady() && !voted;
  ["a", "b"].forEach(s => {
    document.getElementById(`vote-${s}`).disabled = !ready;
  });
}

async function vote(side) {
  if (!bothReady() || voted) return;
  voted = true;
  updateVoteButtons();
  markWinner(side);

  const loser = side === "a" ? "b" : "a";
  const payload = {
    batch: state[side].batch,
    prompt: state[side].prompt,
    winner: side,
    sides: {
      a: { id: state.a.id, model: state.a.model?.id },
      b: { id: state.b.id, model: state.b.model?.id },
    },
  };
  try {
    const resp = await fetch("/api/vote", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await parseJson(resp);
    if (!resp.ok || data.error) throw new Error(data.error || `HTTP ${resp.status}`);
  } catch (e) {
    // Roll back so the user can re-vote.
    voted = false;
    document.getElementById(`vote-${side}`).classList.remove("is-winner");
    document.getElementById(`vote-${loser}`).classList.remove("is-loser");
    updateVoteButtons();
    alert("Vote failed: " + e.message);
  }
}

function markWinner(side) {
  const loser = side === "a" ? "b" : "a";
  const win = document.getElementById(`vote-${side}`);
  const lose = document.getElementById(`vote-${loser}`);
  win.classList.add("is-winner");
  win.classList.remove("is-loser");
  win.textContent = "✓ Chosen";
  lose.classList.add("is-loser");
  lose.classList.remove("is-winner");
  lose.textContent = "▲ This one's better";
}

function buildPage(html, css, js) {
  // Escape closing script tags inside JS to prevent early close
  const safeJs = (js || "").replace(/<\/script>/gi, "<\\/script>");
  return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>${css || ""}</style>
</head>
<body>
${html || ""}
${js ? `<script>${safeJs}<\/script>` : ""}
</body>
</html>`;
}

function renderResult(side, { html, css, js }) {
  const frame = document.getElementById(`frame-${side}`);
  document.getElementById(`empty-${side}`).hidden = true;
  document.getElementById(`error-${side}`).hidden = true;
  frame.hidden = false;
  frame.srcdoc = buildPage(html, css, js);
}

// ── UI state helpers ───────────────────────────────────────────────────────
function setLoading(side, on, modelId) {
  document.getElementById(`loading-${side}`).hidden = !on;
  if (on && modelId) {
    document.getElementById(`loading-model-${side}`).textContent = modelId;
  }
  const frame = document.getElementById(`frame-${side}`);
  if (!frame.hidden) frame.style.opacity = on ? "0.25" : "1";
  if (on) startTimer(side); else stopTimer(side);
}

function startTimer(side) {
  stopTimer(side);
  const el = document.getElementById(`loading-timer-${side}`);
  const t0 = performance.now();
  el.textContent = "0.0s";
  timers[side] = setInterval(() => {
    el.textContent = ((performance.now() - t0) / 1000).toFixed(1) + "s";
  }, 100);
}

function stopTimer(side) {
  if (timers[side]) { clearInterval(timers[side]); timers[side] = null; }
}

function setMeta(side, elapsed, truncated) {
  const el = document.getElementById(`meta-${side}`);
  if (elapsed == null) { el.textContent = ""; return; }
  el.textContent = (truncated ? "⚠ " : "✓ ") + elapsed + "s";
  el.classList.toggle("is-truncated", !!truncated);
}

function setTruncated(side, on) {
  document.getElementById(`wrap-${side}`).classList.toggle("is-truncated", !!on);
  document.getElementById(`trunc-${side}`).hidden = !on;
}

function clearResult(side) {
  document.getElementById(`error-${side}`).hidden = true;
}

function showError(side, msg) {
  document.getElementById(`frame-${side}`).hidden = true;
  document.getElementById(`empty-${side}`).hidden = true;
  const err = document.getElementById(`error-${side}`);
  err.hidden = false;
  document.getElementById(`error-msg-${side}`).textContent = msg;
}

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  initPicker("a");
  initPicker("b");

  document.getElementById("btn-gen-prompt")
    .addEventListener("click", generatePrompt);
  document.getElementById("btn-generate")
    .addEventListener("click", generateBoth);
  document.getElementById("continue-a")
    .addEventListener("click", () => continueGen("a"));
  document.getElementById("continue-b")
    .addEventListener("click", () => continueGen("b"));
  document.getElementById("vote-a")
    .addEventListener("click", () => vote("a"));
  document.getElementById("vote-b")
    .addEventListener("click", () => vote("b"));

  // Cmd/Ctrl+Enter to generate from textarea
  document.getElementById("prompt-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      generateBoth();
    }
  });

  loadModels();
});
</script>
</body>
</html>
